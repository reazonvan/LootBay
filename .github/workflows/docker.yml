name: Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push user-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.user
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-user-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-user-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push product-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.product
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-product-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-product-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push order-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.order
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-order-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-order-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push payment-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.payment
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-payment-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-payment-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push chat-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.chat
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-chat-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-chat-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push notification-service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.notification
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-notification-service:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-notification-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push api-gateway
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.gateway
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-api-gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-api-gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./web
        file: ./docker/Dockerfile.frontend
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/lootbay-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/lootbay-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max 