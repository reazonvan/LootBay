version: '3.8'

services:
  # База данных PostgreSQL
  postgres:
    image: postgres:15
    container_name: lootbay_postgres
    environment:
      POSTGRES_DB: lootbay
      POSTGRES_USER: lootbay
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lootbay_network

  # Redis для кэширования и сессий
  redis:
    image: redis:7-alpine
    container_name: lootbay_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - lootbay_network

  # MongoDB для чата
  mongodb:
    image: mongo:6
    container_name: lootbay_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: lootbay
      MONGO_INITDB_ROOT_PASSWORD: lootbay_password
      MONGO_INITDB_DATABASE: lootbay_chat
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lootbay_network

  # RabbitMQ для очередей
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lootbay_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: lootbay
      RABBITMQ_DEFAULT_PASS: lootbay_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lootbay_network

  # Frontend Next.js
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lootbay_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost
      - NEXT_PUBLIC_WS_URL=ws://localhost
    depends_on:
      - api-gateway
    networks:
      - lootbay_network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: lootbay_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
      - frontend
    networks:
      - lootbay_network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: lootbay_api_gateway
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - user-service
      - product-service
      - order-service
      - payment-service
      - chat-service
      - notification-service
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # User Service
  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.user
    container_name: lootbay_user_service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # Product Service
  product-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.product
    container_name: lootbay_product_service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # Order Service with Escrow
  order-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.order
    container_name: lootbay_order_service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # Payment Service
  payment-service:
    container_name: lootbay_payment_service
    build:
      context: .
      dockerfile: docker/Dockerfile.payment
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # Chat Service with WebSocket
  chat-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.chat
    container_name: lootbay_chat_service
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.notification
    container_name: lootbay_notification_service
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - redis
    environment:
      - SERVER_MODE=release
    networks:
      - lootbay_network

  # MCP Server для AI ассистента
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: lootbay_mcp_server
    ports:
      - "8088:8080"
    environment:
      - MCP_PORT=8080
    command: "/mcp-server"
    depends_on:
      - postgres
      - redis
    networks:
      - lootbay_network

  # Prometheus для мониторинга
  prometheus:
    image: prom/prometheus:latest
    container_name: lootbay_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - lootbay_network

  # Grafana для дашбордов
  grafana:
    image: grafana/grafana:latest
    container_name: lootbay_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - lootbay_network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  lootbay_network:
    driver: bridge 